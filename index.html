<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control Financiero</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f1115;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

h1{
margin-bottom:20px;
}

.section{
background:#171a21;
padding:20px;
border-radius:8px;
border:1px solid #2a2f3a;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
background:#1c1f26;
border:1px solid #333;
color:white;
}

button{
background:#4ade80;
border:none;
padding:10px;
cursor:pointer;
}

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.kpi{
background:#171a21;
padding:15px;
border-radius:8px;
border:1px solid #2a2f3a;
}

.kpi-title{
font-size:12px;
color:#aaa;
}

.kpi-value{
font-size:20px;
font-weight:bold;
}

.chart-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #2a2f3a;
}

</style>

</head>

<body>

<div class="container">

<h1>Control Financiero</h1>

<div class="grid">

<div class="section">

<h3>Registrar ingreso</h3>

<label>Fecha</label>
<input type="date" id="fechaIngreso">

<label>Monto</label>
<input type="number" id="montoIngreso">

<label>Categoría</label>
<input type="text" id="catIngreso">

<button onclick="agregarIngreso()">Guardar</button>

</div>

<div class="section">

<h3>Registrar gasto</h3>

<label>Fecha</label>
<input type="date" id="fechaGasto">

<label>Monto</label>
<input type="number" id="montoGasto">

<label>Categoría</label>
<input type="text" id="catGasto">

<button onclick="agregarGasto()">Guardar</button>

</div>

</div>

<div class="section">

<label>Filtrar por mes</label>

<select id="filtroMes" onchange="renderDashboard()">
<option value="todos">Todos</option>
<option value="0">Enero</option>
<option value="1">Febrero</option>
<option value="2">Marzo</option>
<option value="3">Abril</option>
<option value="4">Mayo</option>
<option value="5">Junio</option>
<option value="6">Julio</option>
<option value="7">Agosto</option>
<option value="8">Septiembre</option>
<option value="9">Octubre</option>
<option value="10">Noviembre</option>
<option value="11">Diciembre</option>
</select>

</div>

<div class="kpis">

<div class="kpi">
<div class="kpi-title">Ingresos</div>
<div class="kpi-value" id="kpiIngresos">$0</div>
</div>

<div class="kpi">
<div class="kpi-title">Gastos</div>
<div class="kpi-value" id="kpiGastos">$0</div>
</div>

<div class="kpi">
<div class="kpi-title">Balance</div>
<div class="kpi-value" id="kpiBalance">$0</div>
</div>

<div class="kpi">
<div class="kpi-title">% Ahorro</div>
<div class="kpi-value" id="kpiAhorro">0%</div>
</div>

</div>

<div class="chart-grid">

<div class="section">
<canvas id="trendChart"></canvas>
</div>

<div class="section">
<canvas id="catChart"></canvas>
</div>

</div>

<div class="section">

<h3>Movimientos</h3>

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Categoría</th>
<th>Monto</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

let datos=[]

function agregarIngreso(){

datos.push({
fecha:document.getElementById("fechaIngreso").value,
tipo:"ingreso",
categoria:document.getElementById("catIngreso").value,
monto:parseFloat(document.getElementById("montoIngreso").value)
})

renderDashboard()

}

function agregarGasto(){

datos.push({
fecha:document.getElementById("fechaGasto").value,
tipo:"gasto",
categoria:document.getElementById("catGasto").value,
monto:parseFloat(document.getElementById("montoGasto").value)
})

renderDashboard()

}

function renderDashboard(){

let mes=document.getElementById("filtroMes").value

let ingresos=0
let gastos=0

let categorias={}

let tabla=document.getElementById("tabla")
tabla.innerHTML=""

datos.forEach(d=>{

let m=new Date(d.fecha).getMonth()

if(mes!="todos" && m!=mes) return

if(d.tipo=="ingreso") ingresos+=d.monto
if(d.tipo=="gasto") gastos+=d.monto

if(!categorias[d.categoria]) categorias[d.categoria]=0
categorias[d.categoria]+=d.monto

tabla.innerHTML+=`
<tr>
<td>${d.fecha}</td>
<td>${d.tipo}</td>
<td>${d.categoria}</td>
<td>$${d.monto}</td>
</tr>
`

})

let balance=ingresos-gastos
let ahorro= ingresos>0 ? (balance/ingresos*100).toFixed(1):0

document.getElementById("kpiIngresos").innerText="$"+ingresos
document.getElementById("kpiGastos").innerText="$"+gastos
document.getElementById("kpiBalance").innerText="$"+balance
document.getElementById("kpiAhorro").innerText=ahorro+"%"

}

const trendChart=new Chart(
document.getElementById("trendChart"),
{
type:'line',
data:{
labels:["Ene","Feb","Mar","Abr","May","Jun"],
datasets:[{
label:"Flujo",
data:[0,0,0,0,0,0],
borderColor:"#4ade80"
}]
}
}
)

const catChart=new Chart(
document.getElementById("catChart"),
{
type:'doughnut',
data:{
labels:["Categorías"],
datasets:[{
data:[1],
backgroundColor:["#60a5fa"]
}]
}
}
)

</script>

</body>
</html>
