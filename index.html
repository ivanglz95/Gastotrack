<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GastoTrack</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>

<style>

:root{
--bg:#0e0e10;
--surface:#16161a;
--surface2:#1e1e24;
--border:#2a2a35;

--accent:#c8f000;
--accent2:#ff6b35;

--text:#e8e8f0;
--muted:#6b6b80;

--success:#4ade80;
--danger:#f87171;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Mono',monospace;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(200,240,0,0.025) 1px,transparent 1px),
linear-gradient(90deg,rgba(200,240,0,0.025) 1px,transparent 1px);
background-size:40px 40px;
pointer-events:none;
z-index:0;
}

.app{
position:relative;
z-index:1;
max-width:960px;
margin:0 auto;
padding:32px 20px 80px;
}

header{
display:flex;
align-items:flex-start;
justify-content:space-between;
margin-bottom:36px;
padding-bottom:20px;
border-bottom:1px solid var(--border);
}

.header-left h1{
font-family:'Syne',sans-serif;
font-size:32px;
font-weight:800;
letter-spacing:-1px;
}

.header-left h1 span{
color:var(--accent);
}

.header-left p{
margin-top:4px;
font-size:10px;
color:var(--muted);
letter-spacing:2px;
text-transform:uppercase;
}

.sync-status{
display:flex;
align-items:center;
gap:8px;
font-size:11px;
color:var(--muted);
}

.sync-dot{
width:8px;
height:8px;
border-radius:50%;
background:var(--muted);
}

.sync-dot.ok{
background:var(--success);
box-shadow:0 0 6px var(--success);
}

.sync-dot.loading{
background:var(--accent);
}

.sync-dot.error{
background:var(--danger);
}

nav{
display:flex;
gap:8px;
margin-bottom:28px;
}

.tab{
padding:10px 14px;
font-size:11px;
letter-spacing:1px;
text-transform:uppercase;
border:1px solid var(--border);
background:var(--surface);
color:var(--muted);
cursor:pointer;
}

.tab.active{
border-color:var(--accent);
color:var(--accent);
}

.panel{
display:none;
}

.panel.active{
display:block;
}

.dash-kpi-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:22px;
}

.kpi-card{
background:var(--surface);
border:1px solid var(--border);
padding:14px;
min-height:80px;
display:flex;
flex-direction:column;
justify-content:center;
}

.kpi-label{
font-size:10px;
color:var(--muted);
letter-spacing:1px;
text-transform:uppercase;
margin-bottom:6px;
}

.kpi-value{
font-family:'Syne',sans-serif;
font-size:18px;
font-weight:700;
line-height:1.1;
}

.chart-grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
}

.chart-card{
background:var(--surface);
border:1px solid var(--border);
padding:14px;
}

.chart-title{
font-size:11px;
color:var(--muted);
margin-bottom:10px;
text-transform:uppercase;
letter-spacing:1px;
}

.chart-wrap{
height:180px;
}

.chart-wrap.tall{
height:220px;
}

.chart-wrap.sm{
height:140px;
}

.filter-select{
background:var(--surface2);
border:1px solid var(--border);
color:var(--text);
padding:6px 10px;
font-size:12px;
}

</style>
</head>

<body>

<div class="app">

<header>

<div class="header-left">
<h1>Gasto<span>Track</span></h1>
<p>CONTROL FINANCIERO</p>
</div>

<div class="sync-status">
<div class="sync-dot ok"></div>
<span>sync</span>
</div>

</header>


<nav>

<div class="tab active" onclick="openTab('dashboard')">Dashboard</div>
<div class="tab" onclick="openTab('resumen')">Resumen</div>

</nav>


<div id="dashboard" class="panel active">

<div class="dash-kpi-grid">

<div class="kpi-card">
<div class="kpi-label">Ingresos</div>
<div class="kpi-value" id="kpi_ingresos">0</div>
</div>

<div class="kpi-card">
<div class="kpi-label">Gastos</div>
<div class="kpi-value" id="kpi_gastos">0</div>
</div>

<div class="kpi-card">
<div class="kpi-label">Saldo</div>
<div class="kpi-value" id="kpi_saldo">0</div>
</div>

<div class="kpi-card">
<div class="kpi-label">Tarjetas</div>
<div class="kpi-value" id="kpi_tarjetas">0</div>
</div>

<div class="kpi-card">
<div class="kpi-label">Gastos Fijos</div>
<div class="kpi-value" id="kpi_fijos">0</div>
</div>

<div class="kpi-card">
<div class="kpi-label">Comprometido</div>
<div class="kpi-value" id="kpi_comprometido">0</div>
</div>

</div>

<div class="chart-grid">

<div class="chart-card">
<div class="chart-title">Gastos por categoría</div>
<div class="chart-wrap">
<canvas id="chart_categoria"></canvas>
</div>
</div>

<div class="chart-card">
<div class="chart-title">Gastos por mes</div>
<div class="chart-wrap tall">
<canvas id="chart_mes"></canvas>
</div>
</div>

</div>

</div>


<div id="resumen" class="panel">

<div style="margin-bottom:16px">

<select id="filtroMes" class="filter-select" onchange="filtrarResumen()">

<option value="todos">Todos los meses</option>

<option value="Ene">Enero</option>
<option value="Feb">Febrero</option>
<option value="Mar">Marzo</option>
<option value="Abr">Abril</option>
<option value="May">Mayo</option>
<option value="Jun">Junio</option>
<option value="Jul">Julio</option>
<option value="Ago">Agosto</option>
<option value="Sep">Septiembre</option>
<option value="Oct">Octubre</option>
<option value="Nov">Noviembre</option>
<option value="Dic">Diciembre</option>

</select>

</div>

<div id="tabla_resumen"></div>

</div>


</div>


<script>

function openTab(tab){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(tab).classList.add("active")

event.target.classList.add("active")

}


function filtrarResumen(){

let mes=document.getElementById("filtroMes").value

console.log("filtrar",mes)

}



</script>


</body>
</html>
