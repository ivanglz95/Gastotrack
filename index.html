<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Finance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter;
background:#0f1115;
color:#e6e6e6;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

h1{
font-weight:600;
margin-bottom:20px;
}

.filter{
margin-bottom:20px;
}

select{
padding:8px;
background:#1c1f26;
border:1px solid #333;
color:white;
}

.kpis{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.card{
background:#171a21;
padding:15px;
border-radius:8px;
border:1px solid #2a2f3a;
}

.kpi-title{
font-size:12px;
color:#888;
margin-bottom:8px;
}

.kpi-value{
font-size:22px;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:25px;
}

.chart-card{
background:#171a21;
padding:20px;
border-radius:8px;
border:1px solid #2a2f3a;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #2a2f3a;
font-size:13px;
}

th{
text-align:left;
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h1>Dashboard financiero</h1>

<div class="filter">

<select id="mesFiltro">
<option value="Todos">Todos los meses</option>
<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>
</select>

</div>

<div class="kpis">

<div class="card">
<div class="kpi-title">Ingresos</div>
<div class="kpi-value" id="ingresos">$0</div>
</div>

<div class="card">
<div class="kpi-title">Gastos</div>
<div class="kpi-value" id="gastos">$0</div>
</div>

<div class="card">
<div class="kpi-title">Balance</div>
<div class="kpi-value" id="balance">$0</div>
</div>

<div class="card">
<div class="kpi-title">% Ahorro</div>
<div class="kpi-value" id="ahorro">0%</div>
</div>

</div>

<div class="grid">

<div class="chart-card">
<canvas id="trendChart"></canvas>
</div>

<div class="chart-card">
<canvas id="catChart"></canvas>
</div>

</div>

<div class="chart-card">

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Categoría</th>
<th>Monto</th>
</tr>
</thead>

<tbody id="tablaDatos">

</tbody>

</table>

</div>

</div>

<script>

const trendChart=new Chart(
document.getElementById('trendChart'),
{
type:'line',
data:{
labels:["Ene","Feb","Mar","Abr","May","Jun"],
datasets:[
{
label:"Gastos",
data:[200,400,350,500,450,600],
borderColor:"#ff6b6b"
},
{
label:"Ingresos",
data:[800,900,850,1000,1100,1200],
borderColor:"#4ade80"
}
]
}
}
)

const catChart=new Chart(
document.getElementById('catChart'),
{
type:'doughnut',
data:{
labels:["Alquiler","Comida","Servicios","Otros"],
datasets:[{
data:[500,300,150,100],
backgroundColor:["#ff6b6b","#facc15","#60a5fa","#a78bfa"]
}]
}
}
)

</script>

</body>
</html>
